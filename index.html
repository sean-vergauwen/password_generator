<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shapes" id="bg-shapes"></div>
    <div class="container">
        <div class="card">
            <h1>Password Generator</h1>
            
            <div class="display-container">
                <input type="text" id="password-display" readonly placeholder="P@$$w0rd">
                <button id="copy-btn" title="Copy to clipboard">
                    <svg class="copy-icon" viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    <span id="copy-tooltip">Copied!</span>
                </button>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <div class="setting-label">
                        <span>Password Length</span>
                        <span id="length-value">16</span>
                    </div>
                    <input type="range" id="length-slider" min="8" max="50" value="16">
                </div>

                <div class="options-grid">
                    <label class="checkbox-container">
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                        Uppercase
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                        Lowercase
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                        Numbers
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkmark"></span>
                        Symbols
                    </label>
                </div>
            </div>

            <div class="strength-container">
                <div class="strength-label">Strength: <span id="strength-text">Medium</span></div>
                <div class="strength-meter">
                    <div id="strength-bar"></div>
                </div>
            </div>

            <button id="generate-btn">Generate Password</button>
        </div>
        
        <footer>
            <a href="https://github.com/sean-vergauwen/password_generator" target="_blank" rel="noopener noreferrer">
                <svg class="github-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                View on GitHub
            </a>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
